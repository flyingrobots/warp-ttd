name: Roadmap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: read

concurrency:
  group: roadmap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  roadmap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Verify ROADMAP and GitHub issue DAG sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run roadmap:check
