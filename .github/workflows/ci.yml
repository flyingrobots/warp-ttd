name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Docs: structural and syntax checks
        run: npm run docs:check
      - name: Docs: evidence map checks
        run: npm run docs:evidence
      - name: Docs: impact graph checks
        run: npm run docs:impact
      - name: Docs: editorial checks (advisory)
        run: npm run docs:eval
      - run: npm run check:method
      - run: npx tsc --noEmit
      - run: npm test
      - run: bash scripts/lint-check.sh
